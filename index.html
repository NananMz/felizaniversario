<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Aniversário, Meu Amor!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff5f5;
            color: #4a4a4a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: #ff4d6d; }
        .photo-frame {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #ff4d6d;
            margin: 20px auto;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }
        button {
            background-color: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.1); }
        #surprise { display: none; margin-top: 20px; font-size: 24px; color: #ff4d6d; }
    </style>
</head>
<body>

    <div class="container">
        <div class="photo-frame">
            <img src="https://photos.fife.usercontent.google.com/pw/AP1GczPI97RILr1hJGd8FolEGsXcnVrvN_hi2AkFBRgqqBXUWUBFeEvEKfHPnA=w689-h517-s-no-gm?authuser=2" alt="Nossa Foto">
        </div>
        <h1>Feliz Aniversário! 🎂</h1>
        <p>Hoje o dia é todo seu, mas o presente quem ganhou fui eu por ter você ao meu lado.</p>
        
        <button onclick="revealSurprise()">Clique aqui para uma surpresa</button>
        
        <div id="surprise">
            ❤️ Te amo infinitamente! ❤️
            <br>
            ✨ Você é a melhor parte do meu dia. ✨
        </div>
    </div>

    <script>
        function revealSurprise() {
            document.getElementById('surprise').style.display = 'block';
            alert("Parabéns, linda! 🎉");
            // Aqui você pode adicionar uma biblioteca de confetes depois!
        }
    </script>
</body>
</html>
